services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tp
      POSTGRES_PASSWORD: tp
      POSTGRES_DB: team_presence
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: "postgres://tp:tp@postgres:5432/team_presence"
      REDIS_URL: "redis://redis:6379"
      RUST_LOG: "info,team_presence_server=debug"
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

volumes:
  pg_data:
  redis_data:
