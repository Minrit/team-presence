# Production deployment for team-presence as a single container.
#
# All processes (Postgres, Redis, Axum API, web SPA) live inside one
# image; only port 4006 is exposed externally.
#
# Usage:
#   echo "JWT_SECRET=$(openssl rand -hex 32)" > .env
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  team-presence:
    build:
      context: .
      dockerfile: Dockerfile
    image: team-presence:latest
    container_name: team-presence
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env for production}
      RUST_LOG: ${RUST_LOG:-info,team_presence_server=info}
    volumes:
      - tp_data:/var/lib/team-presence
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4006/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  tp_data:
    name: tp_data
