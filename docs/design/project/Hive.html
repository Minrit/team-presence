<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hive · AI PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fbfbfc; --bg-2:#f5f5f7; --surface:#ffffff;
  --border:#ececef; --border-2:#e1e1e5;
  --fg:#18181b; --fg-2:#52525b; --fg-3:#71717a; --fg-4:#a1a1aa;
  --accent:#6366f1; --accent-hover:#4f46e5;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --purple:#a855f7;
  --term-bg:#0b0b0f; --term-fg:#d4d4d8; --term-border:#1f1f23;
  --radius:8px; --radius-sm:6px; --radius-lg:12px;
  --shadow-sm: 0 1px 2px rgba(16,24,40,0.04);
  --shadow:    0 1px 3px rgba(16,24,40,0.06), 0 1px 2px rgba(16,24,40,0.04);
  --shadow-md: 0 4px 12px rgba(16,24,40,0.08);
  --shadow-lg: 0 20px 40px -10px rgba(16,24,40,0.15);
  --font: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --mono: "Geist Mono", "SF Mono", ui-monospace, monospace;
}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);font-size:13.5px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
#root{height:100%;}
*,*::before,*::after{box-sizing:border-box;}
button,input,textarea{font-family:inherit;color:inherit;}
code,pre,.mono{font-family:var(--mono);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#d4d4d8;border:2px solid transparent;background-clip:content-box;border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#a1a1aa;border:2px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-track{background:transparent;}
@keyframes pulse{0%{transform:scale(0.9);opacity:0.7}100%{transform:scale(2.4);opacity:0}}
@keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade-in{animation:fade-in 200ms ease-out;}
.story-split{display:grid;gap:16px;grid-template-columns:minmax(0,1fr) minmax(0,1.15fr);}
@media (max-width: 1100px){ .story-split{grid-template-columns:minmax(0,1fr);grid-auto-rows:minmax(360px, 1fr);overflow:auto !important;height:auto !important;min-height:100%;} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/ModernUI.jsx"></script>
<script type="text/babel" src="src/ModernTerminal.jsx"></script>
<script type="text/babel" src="src/ModernScreens.jsx"></script>
<script type="text/babel" src="src/ModernApp.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
